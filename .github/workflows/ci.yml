name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'ExifArmor/**/*.swift'
      - '**/*.xcodeproj/**'
      - '**/PrivacyInfo.xcprivacy'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ExifArmor/**/*.swift'
      - '**/*.xcodeproj/**'
      - '**/PrivacyInfo.xcprivacy'
      - '.github/workflows/ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  # ── Privacy Lint ─────────────────────────────────────────────────────────────
  privacy-lint:
    name: Privacy Lint
    runs-on: [self-hosted, Linux, X64, katafract-linux]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Verify no analytics SDKs
        run: |
          set -euo pipefail
          ANALYTICS_PATTERNS="Firebase|Mixpanel|Amplitude|Segment|AppsFlyer|Crashlytics|Sentry|Datadog"
          VIOLATIONS=$(grep -rl "$ANALYTICS_PATTERNS" \
            --include="*.swift" --include="Package.swift" --include="Podfile" \
            . || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "❌ Analytics SDK references found in:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "✅ No analytics SDKs detected."

      - name: Validate PrivacyInfo.xcprivacy files
        run: |
          set -euo pipefail
          VALID_TYPES="NSPrivacyAccessedAPICategoryFileTimestamp|NSPrivacyAccessedAPICategorySystemBootTime|NSPrivacyAccessedAPICategoryDiskSpace|NSPrivacyAccessedAPICategoryUserDefaults"
          VIOLATIONS=0
          while IFS= read -r -d '' file; do
            INVALID=$(grep -o "NSPrivacyAccessedAPICategory[A-Za-z]*" "$file" | grep -vE "^($VALID_TYPES)$" || true)
            if [ -n "$INVALID" ]; then
              echo "❌ $file contains invalid NSPrivacyAccessedAPIType categories:"
              echo "$INVALID"
              VIOLATIONS=$((VIOLATIONS + 1))
            fi
          done < <(find . -name "PrivacyInfo.xcprivacy" -print0)
          if [ "$VIOLATIONS" -gt 0 ]; then exit 1; fi
          echo "✅ All PrivacyInfo.xcprivacy files use valid API categories."

  # ── Build & Test ─────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode (latest stable)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show build environment
        run: |
          set -euo pipefail
          xcodebuild -version
          xcrun simctl list runtimes | grep -E "iOS" | head -5

      - name: Build (no signing)
        run: |
          set -euo pipefail
          xcodebuild build \
            -project ExifArmor.xcodeproj \
            -scheme ExifArmor \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            -quiet

      - name: Run unit tests
        run: |
          set -euo pipefail
          DEVICE=$(xcrun simctl list devices available | grep -E "iPhone 1[5-9]|iPhone 2" | head -1 | sed -E 's/.*\(([A-F0-9-]+)\).*/\1/')
          echo "Testing on device: $DEVICE"
          xcodebuild test \
            -project ExifArmor.xcodeproj \
            -scheme ExifArmor \
            -destination "id=$DEVICE" \
            -only-testing:ExifArmorTests \
            -resultBundlePath test-results.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            -quiet

      - name: Upload test results
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: test-results
          path: test-results.xcresult
          retention-days: 14
